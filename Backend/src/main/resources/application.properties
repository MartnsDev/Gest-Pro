# ================================================
#  application.properties ? configuraþ§es BASE
#  Valores compartilhados entre dev e prod.
#  Apenas o profile ativo muda aqui.
# ================================================

spring.profiles.active=${APP_PROFILE:dev}

# ?? Servidor ????????????????????????????????????
server.port=8080
server.forward-headers-strategy=framework
server.servlet.session.cookie.secure=true
server.error.include-message=always

# ?? JPA / Hibernate ?????????????????????????????
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=create

# ?? Jackson ?????????????????????????????????????
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# ?? Upload ??????????????????????????????????????
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ?? JWT ?????????????????????????????????????????
jwt.secret=${JWT_SECRET}
app.jwt-expiration-ms=604800000

# ?? Basic Auth ??????????????????????????????????
spring.security.user.name=${BASIC_AUTH_USER}
spring.security.user.password=${BASIC_AUTH_PASSWORD}
spring.security.user.roles=ADMIN

# ?? OAuth2 Google ???????????????????????????????
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# ?? E-mail (Resend API) ?????????????????????????
resend.api.key=${RESEND_API_KEY}

# ?? E-mail SMTP (fallback / notificaþ§es internas)
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ?? Stripe ??????????????????????????????????????
stripe.api.key=${STRIPE_API_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# ?? Cloudinary ??????????????????????????????????
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ?? Swagger ?????????????????????????????????????
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html