# ================================================
#  application-prod.properties ? perfil PROD
#  Ativo quando: APP_PROFILE=prod (servidor/CI)
#  NENHUMA vari·vel aqui tem valor padr„o ?
#  tudo deve vir de vari·vel de ambiente ou secret.
# ================================================

# ?? URLs ????????????????????????????????????????
app.base-url=${APP_BASE_URL}
app.frontend.url=${APP_FRONTEND_URL}

# ?? Banco de dados ???????????????????????????????
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ?? JPA / Hibernate ?????????????????????????????
# ddl-auto=validate: n„o altera o schema em prod ?
# use migrations (Flyway/Liquibase) para isso.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ?? Redis ????????????????????????????????????????
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}

# ?? Logs ? mÌnimo em prod ????????????????????????
logging.level.br.com.gestpro=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ?? Erros ? nunca expor stack trace em prod ??????
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# ?? Swagger desabilitado em prod ?????????????????
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ?? OtimizaÁes ??????????????????????????????????
spring.main.lazy-initialization=false
spring.devtools.restart.enabled=false