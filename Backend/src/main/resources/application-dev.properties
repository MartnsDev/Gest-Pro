# ================================================
#  application-dev.properties ? perfil DEV
#  Ativo quando: APP_PROFILE=dev (padr„o local)
#  Rode com: ./mvnw spring-boot:run
#            ou defina APP_PROFILE=dev no .env
# ================================================

# ?? URLs ????????????????????????????????????????
app.base-url=http://localhost:8080
app.frontend.url=http://localhost:3000

# ?? Banco de dados (Docker local padr„o) ????????
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/gestpro?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:5517}

# ?? JPA / Hibernate ?????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ?? Redis (Docker local) ?????????????????????????
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# ?? Logs ? detalhado em dev ??????????????????????
logging.level.br.com.gestpro=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ?? Erros ? stack trace visÌvel em dev ??????????
server.error.include-stacktrace=always
server.error.include-binding-errors=always

# ?? OtimizaÁes desativadas em dev ???????????????
spring.main.lazy-initialization=false
spring.devtools.restart.enabled=true